    function attachMainEvents() {
        const lf = document.getElementById('loginForm');
        if (lf && !lf._bound) {
            lf._bound = true;
            lf.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('loginBtn'); btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
                const errEl = document.getElementById('loginErr'); errEl.classList.add('hidden');
                try {
                    const res = await API.post('login', { username: document.getElementById('loginU').value.trim(), password: await sha256(document.getElementById('loginP').value) });
                    if (res.success) {
                        STATE.currentUser = res.user; STATE.tahunAktif = parseInt(document.getElementById('loginT').value);
                        STATE.dashboardTab = 'beranda'; saveSession(); attachInactivityListeners(); setupInactivityTimer(); startDeadlineCheck();
                        STATE.isSidebarOpen = true; // Reset sidebar state
                        navigate('dashboard');
                    } else { errEl.textContent = res.message; errEl.classList.remove('hidden'); btn.textContent = 'Masuk'; btn.disabled = false; }
                } catch (err) { errEl.textContent = 'Koneksi gagal. Periksa internet Anda.'; errEl.classList.remove('hidden'); btn.textContent = 'Masuk'; btn.disabled = false; }
            });
        }

        const rf = document.getElementById('regForm');
        if (rf && !rf._bound) {
            rf._bound = true;
            rf.addEventListener('submit', async (e) => {
                e.preventDefault();
                const errEl = document.getElementById('regErr'); errEl.classList.add('hidden');
                const role = document.getElementById('regR').value;
                const kode = (document.getElementById('regK') || {}).value || '';
                const dusun = (document.getElementById('regDus') || {}).value || '-';
                const rawPw = document.getElementById('regP').value;
                if (!CONFIG.PASS_REGEX.test(rawPw)) { errEl.textContent = 'Password tidak memenuhi syarat (min 8 karakter, huruf besar, kecil, angka, simbol).'; errEl.classList.remove('hidden'); return; }
                try {
                    const res = await API.post('register', { nama: document.getElementById('regN').value.trim(), username: document.getElementById('regU').value.trim(), email: document.getElementById('regE').value.trim(), password: await sha256(rawPw), role, dusun, kode });
                    if (res.success) { showToast('Berhasil daftar! Silakan masuk.', 'success'); navigate('login'); } 
                    else { errEl.textContent = res.message; errEl.classList.remove('hidden'); }
                } catch (err) { errEl.textContent = 'Koneksi gagal.'; errEl.classList.remove('hidden'); }
            });
        }

        const uf = document.getElementById('formUbahPw');
        if (uf && !uf._bound) {
            uf._bound = true;
            uf.addEventListener('submit', async (e) => {
                e.preventDefault();
                const errEl = document.getElementById('errPw'); errEl.classList.add('hidden');
                const np = document.getElementById('pwNew').value, npC = document.getElementById('pwNewC').value;
                if (!CONFIG.PASS_REGEX.test(np)) { errEl.textContent = 'Password baru tidak memenuhi syarat.'; errEl.classList.remove('hidden'); return; }
                if (np !== npC) { errEl.textContent = 'Konfirmasi password tidak cocok.'; errEl.classList.remove('hidden'); return; }
                try {
                    const res = await API.post('changePassword', { username: STATE.currentUser.username, oldHash: await sha256(document.getElementById('pwOld').value), newHash: await sha256(np) });
                    if (res.success) { showToast('Password berhasil diubah!', 'success'); e.target.reset(); } 
                    else { errEl.textContent = res.message; errEl.classList.remove('hidden'); }
                } catch (err) { errEl.textContent = 'Gagal mengubah password. Periksa koneksi.'; errEl.classList.remove('hidden'); }
            });
        }
    }

    document.addEventListener('click', (e) => {

    /* ==========================================
       15. BACKGROUND HANDLING & INIT
       ========================================== */
    document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible' && STATE.currentUser) {
            try {
                await fetchUsulan(true); await fetchDeadline(); await fetchUsersData(); await fetchDeadlinesData();
                const c = document.getElementById('tabContent');
                if (c) {
                    c.innerHTML = renderTab();
                    if (STATE.dashboardTab === 'beranda') initCharts();
                    if (STATE.dashboardTab === 'users') renderUserTable();
                    if (STATE.dashboardTab === 'pengaturan') renderDeadlineSummary();
                }
            } catch (e) { console.error("Background sync failed", e); }
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('ngusulbee_session');
        if (saved) {
            try {
                const s = JSON.parse(saved);
                STATE.currentUser = s.user; STATE.tahunAktif = s.tahun || new Date().getFullYear();
                STATE.currentView = 'dashboard';
                STATE.isSidebarOpen = true;
                attachInactivityListeners(); setupInactivityTimer(); startDeadlineCheck();
            } catch (e) { clearSession(); }
        }
        render();
    });

    /* ==========================================

        return `<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white rounded-xl p-4 border shadow-sm"><p class="text-xs text-gray-500">Total Usulan</p><p class="font-display font-800 text-xl text-gray-800">${total}</p></div>
            <div class="bg-white rounded-xl p-4 border shadow-sm"><p class="text-xs text-gray-500">Total Estimasi</p><p class="font-display font-800 text-xl text-honey-600">${formatRupiah(totalBiaya)}</p></div>

    /* ==========================================

    function rVerifDesaTable(u, list) {

            if (ra !== rb) return ra - rb; 
            const rda = parseInt(a.rankingDusun) || 999, rdb = parseInt(b.rankingDusun) || 999; 
            if (rda !== rdb) return rda - rdb;
            return (a.judul || '').localeCompare(b.judul || '');

        const btns = `<div class="flex flex-wrap items-center justify-between gap-3 mb-3">

                </button>
                <span id="bulkCountDesa" class="bulk-count hidden text-xs text-honey-700 font-semibold ml-1"><span id="bulkNumDesa">0</span> terpilih</span>
            </div>
           
            <!-- KIRI: Tombol Hanya Icon + Tooltip -->
            <div class="flex items-center gap-2">
                <button onclick="openFormUsulan('musdes_desa')" class="group relative w-10 h-10 flex items-center justify-center rounded-lg bg-indigo-600 text-white shadow-sm hover:bg-indigo-700 transition-colors">

                    <span class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-gray-800 text-white text-[10px] font-medium rounded-md whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50">Input Usulan Musdes</span>
                </button>
                <button onclick="openAjukanKembaliDesaModal()" class="group relative w-10 h-10 flex items-center justify-center rounded-lg bg-amber-500 text-white shadow-sm hover:bg-amber-600 transition-colors">

                    <span class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-gray-800 text-white text-[10px] font-medium rounded-md whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50">Ajukan Kembali (Tahun Lalu)</span>
                </button>

        const tableRows = sorted.length ? sorted.map((i, n) => {
            const kasiList = cachedUsers.filter(ku => ku.role === 'kasikaur');

                });
            } else {
                ['Kasi Pemerintahan', 'Kasi Kesejahteraan', 'Kaur Keuangan', 'Kaur Tata Pemerintahan'].forEach(p => { 
                    kordHtml += `<option value="${escapeHtml(p)}" ${i.kordinator === p ? 'selected' : ''}>${escapeHtml(p)}</option>`; 
                });

            const canEditMusdes = i.isMusdes && (i.status === 'ranked_dusun' || i.status === 'dikembalikan_dusun');

            // ✅ ACTION BUTTONS
            let actionBtns = `<div class="flex items-center gap-1.5 mt-1">

                    <span class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-gray-800 text-white text-[10px] font-medium rounded-md whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50">Verifikasi Final</span>

                <!-- ✅ DISEMBUNYIKAN JIKA INI USULAN BUATAN ADM DESA (isMusdes) -->

                ${canEditMusdes ? `

                <!-- Edit Musdes -->
                <button onclick="openFormUsulan('${escapeJs(i.id)}')" class="group relative w-8 h-8 flex items-center justify-center rounded-lg bg-indigo-100 text-indigo-600 hover:bg-indigo-200 transition-colors">

                </button>
                ` : ''}
            </div>`;

            return `<tbody id="row-desa-${i.id}" class="text-sm">
                        <tr class="main-row cursor-pointer hover:bg-gray-50" onclick="showDetail('${escapeJs(i.id)}')">
                            <td class="text-center border-b" onclick="event.stopPropagation()"><input type="checkbox" class="bulk-check-desa accent-honey-500" data-id="${i.id}" onchange="updateBulkCountDesa()"></td>

                                        <select id="aksi-${i.id}" onchange="toggleRujukan('${escapeJs(i.id)}',this.value)" class="px-2 py-1.5 border rounded-lg text-sm bg-white mt-1">
                                            <option value="">Pilih...</option>
                                            <option value="Kewenangan Desa" ${i.rencanaAksi === 'Kewenangan Desa' ? 'selected' : ''}>Kewenangan Desa</option>
                                            <option value="Non Kewenangan Desa" ${i.rencanaAksi === 'Non Kewenangan Desa' ? 'selected' : ''}>Non Kewenangan Desa</option>

            <!-- ✅ PERBAIKAN: HAPUS "list.length ?" SEHINGGA TOMBOL SELALU TAMPIL -->

                    ${tableRows || `<tbody class="text-sm"><tr><td colspan="10" class="text-center text-gray-400 py-6">${emptyRow(10, 'Semua usulan sudah diverifikasi')}</td></tr></tbody>`}

    function filterListUsulanLamaDesa() {
        if (!window._tmpUsulanLamaDesa) return;
        const dusun = document.getElementById('filterDusunLamaDesa').value;
        const search = document.getElementById('searchLamaDesa').value.toLowerCase();
        
        const filtered = window._tmpUsulanLamaDesa.filter(u => {
            const matchDusun = !dusun || u.dusun === dusun;
            const matchSearch = !search || u.judul.toLowerCase().includes(search);
            return matchDusun && matchSearch;
        });
        
        renderListUsulanLamaDesa(filtered);
    }

    function updateCountKembaliDesa() {
        const checked = document.querySelectorAll('.check-kembali-desa:checked').length;
        document.getElementById('countLamaDesa').textContent = checked;
        document.getElementById('btnSubmitKembaliDesa').disabled = checked === 0;
    }

    async function submitAjukanKembaliDesa() {
        const checkedEls = document.querySelectorAll('.check-kembali-desa:checked');
        const ids = Array.from(checkedEls).map(el => el.value);
        
        if (ids.length === 0) {
            showToast('Pilih minimal 1 usulan musdes untuk diajukan kembali', 'error');
            return;
        }

        const btn = document.getElementById('btnSubmitKembaliDesa');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i> Memproses...';

        try {
            const res = await API.post('ajukanKembaliDesa', { 
                ids: ids, 
                tahunBaru: STATE.tahunAktif 
            });

            if (res.success) {
                let msg = res.message || 'Berhasil diajukan kembali';
                if (res.skipped > 0) {
                    msg += ` (${res.skipped} usulan dilewati karena status tidak memenuhi syarat)`;
                }
                showToast(msg, 'success');
                
                closeModalId('modalAjukanKembaliDesa');
                await fetchUsulan(true);
                
                const c = document.getElementById('tabContent');
                if (c) {
                    c.innerHTML = renderTab();
                    if (STATE.dashboardTab === 'beranda') initCharts();
                }
            } else {
                showToast(res.message || 'Gagal mengajukan kembali', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        } catch (e) {
            showToast('Gagal mengajukan kembali. Periksa koneksi internet.', 'error');
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

        if (modal) modal.classList.add('hidden');
    }

    /* ==========================================
       FITUR SEARCH & SORTIR DINAMIS DESA
       ========================================== */
    function filterDesaTable(q) {
        q = q.toLowerCase();
        const rows = document.querySelectorAll('table tbody[id^="row-desa-"]');
        rows.forEach(tbody => {
            const text = tbody.textContent.toLowerCase();
            tbody.style.display = text.includes(q) ? '' : 'none';
        });
        
        // Perbarui nomor urut saat filter berubah
        sortDesaTable(); 
    }

    function sortDesaTable() {
        const table = document.getElementById('tableDesaWrap');
        if (!table) return;
        
        // Ambil semua baris usulan
        const items = Array.from(table.querySelectorAll('tbody[id^="row-desa-"]'));
        
        // Urutkan berdasarkan nilai input ranking desa
        items.sort((a, b) => {
            const rankAInput = a.querySelector('input[type="number"]');
            const rankBInput = b.querySelector('input[type="number"]');
            
            // Jika kosong, anggap 999 (didorong ke paling bawah)
            const valA = parseInt(rankAInput?.value) || 999;
            const valB = parseInt(rankBInput?.value) || 999;
            
            if (valA === valB) return 0;
            return valA - valB; // Ascending
        });
        
        // Pindahkan posisi elemen di DOM secara langsung
        items.forEach(item => table.appendChild(item));
        
        // Update ulang nomor urut (No) agar rapi sesuai urutan baru yang terlihat
        let num = 1;
        items.forEach(item => {
            const numCell = item.querySelector('.row-desa-num');
            // Hanya update nomor untuk baris yang tidak sedang di-hide oleh search
            if (numCell && item.style.display !== 'none') {
                numCell.textContent = num++;
            }
        });
    }

    // ==========================================
    // HAPUS USULAN MUSDES (KHUSUS ADM DESA)
    // ==========================================
    async function deleteUsulanMusdes(id, judul) {
        // Potong judul jika terlalu panjang agar modal tidak terlalu tinggi
        const shortJudul = judul.length > 60 ? judul.substring(0, 60) + '...' : judul;
        
        // Gunakan custom modal konfirmasi
        const isConfirmed = await showDeleteConfirm(
            'Hapus Usulan Musdes?', 
            `Anda akan menghapus usulan:<br><strong>"${shortJudul}"</strong><br><br>Aksi ini tidak dapat dibatalkan.`
        );

        // Jika user menekan "Batal" atau area luar
        if (!isConfirmed) return;

        // Lanjutkan proses hapus ke backend...
        setTableLoading(true);
        try {
            const res = await API.post('deleteUsulanMusdes', { id: id });
            if (res.success) {
                showToast(res.message || 'Usulan musdes berhasil dihapus', 'success');
                // Refresh data setelah berhasil hapus
                await fetchUsulan(true); 
                const c = document.getElementById('tabContent');
                if (c) {
                    c.innerHTML = renderTab();
                    if (STATE.dashboardTab === 'beranda') initCharts();
                }
            } else {
                showToast(res.message || 'Gagal menghapus usulan', 'error');
            }
        } catch (e) {
            showToast('Gagal menghapus. Periksa koneksi internet.', 'error');
        } finally {
            setTableLoading(false);
        }
    }

    function showDeleteConfirm(title, message) {
        return new Promise((resolve) => {
            // Buat elemen overlay
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-card">
                    <div class="confirm-icon">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </div>
                    <div class="confirm-title">${title}</div>
                    <div class="confirm-message">${message}</div>
                    <div class="confirm-actions">
                        <button class="confirm-btn confirm-btn-cancel" id="btnCancel">Batal</button>
                        <button class="confirm-btn confirm-btn-delete" id="btnDelete">Ya, Hapus</button>
                    </div>
                </div>
            `;

            document.body.appendChild(overlay);

            // Animasi masuk
            requestAnimationFrame(() => {
                overlay.classList.add('active');
            });

            // Fungsi untuk menutup modal
            const closeModal = (result) => {
                overlay.classList.remove('active');
                setTimeout(() => {
                    overlay.remove();
                    resolve(result);
                }, 200); // Waktu sesuai durasi CSS transition
            };

            // Event Listener
            overlay.querySelector('#btnCancel').addEventListener('click', () => closeModal(false));
            overlay.querySelector('#btnDelete').addEventListener('click', () => closeModal(true));
            
            // Tutup jika klik area luar (overlay hitam)
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closeModal(false);
            });
        });
    }

    /* ==========================================
       TABEL VERIFIKASI DUSUN (DINAMIS + SEARCH)
       ========================================== */
    /* NORMALISASI SDG IDS DARI BERBAGAI FORMAT */
    function normalizeSdgIds(item) {
        if (Array.isArray(item.sdgIds)) {
            return item.sdgIds.map(id => String(id).trim()).filter(Boolean);
        }
        if (typeof item.sdgIds === 'string' && item.sdgIds.trim()) {
            return item.sdgIds.split(',').map(s => String(s).trim()).filter(Boolean);
        }
        if (item.sdgId !== null && item.sdgId !== undefined && item.sdgId !== '') {
            var str = String(item.sdgId).trim();
            if (str.indexOf(',') !== -1) {
                return str.split(',').map(s => s.trim()).filter(Boolean);
            }
            return [str];
        }
        if (Array.isArray(item.sdgs)) {
            return item.sdgs.map(s => String(s.id || s.sdgId || s).trim()).filter(Boolean);
        }
        if (typeof item.sdgs === 'string' && item.sdgs.trim()) {
            try {
                const parsed = JSON.parse(item.sdgs);
                if (Array.isArray(parsed)) {
                    return parsed.map(s => String(s.id || s.sdgId || s).trim()).filter(Boolean);
                }
            } catch (e) {
                const matches = item.sdgs.match(/\d+/g);
                return matches || [];
            }
        }
        return [];
    }

    /* ==========================================
    CEK SDG TERPILIH (TYPE-SAFE)
    ========================================== */
    function isSdgSelected(normalizedIds, sdgId) {
        return normalizedIds.some(id => String(id) === String(sdgId));
    }

    /* ==========================================
       FITUR SEARCH & SORTIR DINAMIS DUSUN
       ========================================== */
    function filterDusunTable(q) {
        q = q.toLowerCase();
        const rows = document.querySelectorAll('table tbody[id^="row-"]');
        rows.forEach(tbody => {
            const text = tbody.textContent.toLowerCase();
            tbody.style.display = text.includes(q) ? '' : 'none';
        });
        sortDusunTable(); 
    }

    function sortDusunTable() {
        const table = document.getElementById('tableDusunWrap');
        if (!table) return;
        
        const items = Array.from(table.querySelectorAll('tbody[id^="row-"]'));
        
        items.sort((a, b) => {
            const rankAInput = a.querySelector('input[type="number"]');
            const rankBInput = b.querySelector('input[type="number"]');
            
            const valA = parseInt(rankAInput?.value) || 999;
            const valB = parseInt(rankBInput?.value) || 999;
            
            if (valA === valB) return 0;
            return valA - valB; 
        });
        
        items.forEach(item => table.appendChild(item));
        
        let num = 1;
        items.forEach(item => {
            const numCell = item.querySelector('.row-num');
            if (numCell && item.style.display !== 'none') {
                numCell.textContent = num++;
            }
        });
    }

    /* ==========================================
    AKSI PROSES DUSUN & DESA
    ========================================== */
    async function prosesDusun(id, status) {
        const rankEl = document.getElementById('rank-' + id);
        const sdgEl = document.getElementById('sdg-' + id);
        const rank = rankEl ? rankEl.value : '';
        const sdgId = sdgEl ? sdgEl.value : '';
        
        if (status === 'ranked_dusun' && !rank) {
            showToast('Masukkan ranking dusun terlebih dahulu', 'warning');
            if (rankEl) rankEl.focus();
            return;
        }
        setTableLoading(true);
        const res = await API.post('prosesDusun', { id: id, status: status, rankingDusun: rank, sdgId: sdgId });
        if (res.success) {
            showToast('Usulan berhasil diproses', 'success');
            await refreshCurrentTab();
        } else {
            showToast(res.message || 'Gagal memproses usulan', 'error');
            setTableLoading(false);
        }
    }

    async function bulkProsesDusun() {
        const checks = document.querySelectorAll('.bulk-check:checked');
        if (!checks.length) { showToast('Pilih minimal satu usulan', 'warning'); return; }
        const ids = [];
        let hasEmptyRank = false;
        checks.forEach(c => {
            const id = c.dataset.id;
            const rankEl = document.getElementById('rank-' + id);
            const sdgEl = document.getElementById('sdg-' + id);
            const rank = rankEl ? rankEl.value : '';
            const sdgId = sdgEl ? sdgEl.value : '';
            if (!rank) hasEmptyRank = true;
            ids.push({ id: id, rankingDusun: rank, sdgId: sdgId });
        });
        if (hasEmptyRank) { showToast('Semua usulan terpilih harus memiliki ranking', 'warning'); return; }
        setTableLoading(true);
        let allOk = true;
        for (const item of ids) {
            const res = await API.post('prosesDusun', { id: item.id, status: 'ranked_dusun', rankingDusun: item.rankingDusun, sdgId: item.sdgId });
            if (!res.success) allOk = false;
        }
        if (allOk) {
            showToast(`${ids.length} usulan berhasil disubmit ke Desa`, 'success');
            await refreshCurrentTab();
        } else {
            showToast('Sebagian usulan gagal diproses', 'error');
            setTableLoading(false);
        }
    }

        if (!checks.length) { showToast('Pilih minimal satu usulan', 'warning'); return; }
        
        const items = [];
        let hasEmpty = false;
        
        checks.forEach(c => {
            const id = c.dataset.id;
            const rankEl = document.getElementById('rankd-' + id);
            const aksiEl = document.getElementById('aksi-' + id);
            const rujukEl = document.getElementById('rujuk-' + id);
            const kordEl = document.getElementById('kord-' + id);
            
            const rankDesa = rankEl ? rankEl.value : '';
            const rencanaAksi = aksiEl ? aksiEl.value : '';
            const rujukanUsulan = rujukEl ? rujukEl.value : '';
            const kordinator = kordEl ? kordEl.value : '';
            
            if (!rankDesa || !rencanaAksi) hasEmpty = true;

            showToast(`${successCount} usulan berhasil difinalisasi`, 'success');

            sdgId: sdgIds.join(',')  // <-- Diubah jadi sdgId agar cocok dengan Code.gs

        if (res.success) {

                u.rankingDusun = rankVal;   // <-- DITAMBAHKAN

            // 4. PANGGIL FUNGSI SORTIR OTOMATIS

            sortDusunTable(); 
        } else {
            showToast(res.message || 'Gagal memperbarui data', 'error');
        }
        setTableLoading(false);

        // ─── Toggle dropdown ───
        function toggleSdgDropdown(id) {
            const dropdown = document.getElementById('sdg-dropdown-' + id);
            const arrow = document.getElementById('sdg-arrow-' + id);
            const isHidden = dropdown.classList.contains('hidden');

            // Tutup semua dropdown lain dulu
            document.querySelectorAll('[id^="sdg-dropdown-"]').forEach(d => {
                d.classList.add('hidden');
            });
            document.querySelectorAll('[id^="sdg-arrow-"]').forEach(a => {
                a.style.transform = '';
            });

            if (isHidden) {
                dropdown.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
                // Focus ke search input
                const searchInput = dropdown.querySelector('input[type="text"]');
                if (searchInput) {
                    searchInput.value = '';
                    filterSdgOptions(id, '');
                    setTimeout(() => searchInput.focus(), 50);
                }
            }
        }

        // ─── Filter / search ───
        function filterSdgOptions(id, keyword) {
            const options = document.querySelectorAll('.sdg-option-' + id);
            const kw = keyword.toLowerCase().trim();
            options.forEach(opt => {
                const text = (opt.getAttribute('data-sdg-text') || '').toLowerCase();
                opt.style.display = (!kw || text.includes(kw)) ? '' : 'none';
            });
        }

        // ─── Update chip setelah checkbox berubah ───
        function updateSdgChips(id) {
            const checkboxes = document.querySelectorAll('.sdg-cb-' + id + ':checked');
            const chipsContainer = document.getElementById('sdg-chips-' + id);
            const placeholder = document.getElementById('sdg-placeholder-' + id);

            if (checkboxes.length === 0) {
                placeholder.classList.remove('hidden');
                chipsContainer.innerHTML = '';
            } else {
                placeholder.classList.add('hidden');
                chipsContainer.innerHTML = Array.from(checkboxes).map(cb => {
                    const label = cb.closest('label');
                    const kode = label.querySelector('.font-semibold').textContent.trim();
                    return `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded text-[10px] font-medium" data-sdg-chip="${cb.value}">
                        ${kode}
                        <i class="fas fa-times cursor-pointer hover:text-red-500 transition-colors" 
                        onclick="event.stopPropagation(); removeSdg('${id}', '${cb.value}')"></i>
                    </span>`;
                }).join('');
            }
        }

        // ─── Hapus satu SDG dari chip ───
        function removeSdg(id, value) {
            const cb = document.querySelector(`.sdg-cb-${id}[value="${value}"]`);
            if (cb) {
                cb.checked = false;
                updateSdgChips(id);
            }
        }

        // ─── Ambil nilai SDGs terpilih (array string) ───
        function getSelectedSdgs(id) {
            const checkboxes = document.querySelectorAll('.sdg-cb-' + id + ':checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // ─── Tutup dropdown saat klik di luar ───
        document.addEventListener('click', function (e) {
            document.querySelectorAll('[id^="sdg-wrapper-"]').forEach(wrapper => {
                if (!wrapper.contains(e.target)) {
                    const id = wrapper.id.replace('sdg-wrapper-', '');
                    const dropdown = document.getElementById('sdg-dropdown-' + id);
                    const arrow = document.getElementById('sdg-arrow-' + id);
                    if (dropdown) dropdown.classList.add('hidden');
                    if (arrow) arrow.style.transform = '';
                }
            });
        });

                    </div>
                </div>
            </div>
        `);
    }

    async function konfirmasiKembalikan(id, status) {
        const catatan = document.getElementById('kembaliCatatan');
        const errEl = document.getElementById('kembalikanErr');
        
        if (!catatan || !catatan.value.trim()) {
            if (errEl) { errEl.classList.remove('hidden'); errEl.textContent = 'Catatan pengembalian wajib diisi'; }
            return;
        }

        closeModal();
        setTableLoading(true);

        let action = 'prosesDesa';
        let payload = { id: id, status: status, catatanKembali: catatan.value.trim() };

        if (status === 'dikembalikan_user') {
            action = 'prosesDusun';
        }

        const res = await API.post(action, payload);
        if (res.success) {
            showToast('Usulan berhasil dikembalikan', 'success');
            await refreshCurrentTab();
        } else {
            showToast(res.message || 'Gagal mengembalikan usulan', 'error');
            setTableLoading(false);
        }
    }

        closeModal();
        setTableLoading(true);
        const res = await API.post('deleteUsulan', { ids: [id] });
        if (res.success) {
            showToast('Usulan musyawarah berhasil dihapus', 'success');
            await refreshCurrentTab();
        } else {
            showToast(res.message || 'Gagal menghapus usulan', 'error');
            setTableLoading(false);
        }
    }
    </script>
</body>
</html>
